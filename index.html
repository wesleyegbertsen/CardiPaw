<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->

    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cardipaw.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cardipaw.com/" />
    <meta property="og:title" content="CardiPaw – Free RRR Tracker for Cats &amp; Dogs with Heart Conditions" />
    <meta property="og:description" content="Free, private resting respiratory rate tracker for cats and dogs with HCM or cardiac conditions. Count breaths, chart trends, and export PDF reports — all stored locally." />

    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="CardiPaw app icon" />
    <meta property="og:site_name" content="CardiPaw" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://cardipaw.com/" />
    <meta name="twitter:title" content="CardiPaw – Free RRR Tracker for Cats &amp; Dogs with Heart Conditions" />
    <meta name="twitter:description" content="Free, private resting respiratory rate tracker for cats and dogs with HCM or cardiac conditions. Count breaths, chart trends, and export PDF reports — all stored locally." />
    <meta name="twitter:image" content="https://cardipaw.com/pwa-512x512.png" />
    <meta name="twitter:image:alt" content="CardiPaw app icon" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CardiPaw",
      "url": "https://cardipaw.com/",
      "description": "Free, privacy-first resting respiratory rate tracker for cats and dogs with HCM or cardiac conditions. Track RRR, visualise trends, and generate PDF reports. All data stored locally in the browser.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web, Android, iOS",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Guided 30-second RRR measurement",
        "Multi-pet support",
        "Trend charts (week, month, year)",
        "PDF report export",
        "Offline-capable PWA",
        "No account required",
        "Local-only data storage"
      ],
      "screenshot": "https://cardipaw.com/pwa-512x512.png",
      "inLanguage": "en"
    }
    </script>

    <!-- Icons & PWA -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="theme-color" content="#e05c7a" />

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
